name: ColorWheel
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  ColorWheel:
    type: application
    platform: iOS
    sources:
      - path: ColorWheel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ColorWheel
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ColorWheel/Info.plist
        ENABLE_PREVIEWS: YES

  ColorWheelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ColorWheelTests
    dependencies:
      - target: ColorWheel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ColorWheelTests
        GENERATE_INFOPLIST_FILE: YES
